# Site settings
title: "Guru, Eerla | Data Engineering"
description: "Lead Engineer building real-world data systems. Strong opinions on data engineering, system design, and practical solutions."
baseurl: "/data-engineering-blog"
url: "https://eerla.github.io"
author: "Guru, Eerla"

# Permalinks
permalink: pretty

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 10
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      categories: "data-engineering"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
    values:
      layout: "default"

# SEO
twitter:
  username: think-data
  card: summary

social:
  name: Guru
  links:
    - https://github.com/eerla
    - https://medium.com/@think-data
    - https://www.linkedin.com/in/guru-e/

# Google Analytics (add your tracking ID)
google_analytics: 

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/

# Include
include:
  - .htaccess
  - _pages

# Markdown processing
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Site navigation
navigation:
  - title: "Home"
    url: ""
  - title: "Roadmap"
    url: "/roadmap/"
  - title: "Layers"
    url: "/layers/"
  - title: "Cloud Tools"
    url: "/cloud-tools/"
  - title: "Tools"
    url: "/tools/"
  - title: "Blog"
    url: "/blog/"
  - title: "Series"
    url: "/series/"
  - title: "Projects"
    url: "/projects/"
  - title: "About"
    url: "/about/"

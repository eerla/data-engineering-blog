  layer: Data Consumption
  type: BI
  description: Open-source business intelligence platform
  when_to_use: When you need free, customizable BI with SQL interface
  category: Business Intelligence

- name: Tableau
  layer: Data Consumption
  type: BI
  description: Visual analytics platform for enterprise reporting
  when_to_use: When you need advanced visualizations and enterprise features
  category: Business Intelligence

- name: Looker
  layer: Data Consumption
  type: BI
  description: Data platform with embedded analytics and modeling
  when_to_use: When you need governed, collaborative BI experience
  category: Business Intelligence

- name: Power BI
  layer: Data Consumption
  type: BI
  description: Microsoft's business analytics and visualization platform
  when_to_use: When you're in Microsoft ecosystem and need enterprise BI
  category: Business Intelligence

- name: Grafana
  layer: Data Consumption
  type: Monitoring
